<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D Hand Tracking with MediaPipe and Three.js</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        #video-container {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            height: 180px;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-family: sans-serif;
        }
        video {
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <div id="video-container">
        <video id="video" playsinline style="transform: scaleX(-1);"></video>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // It's recommended to host the MediaPipe files on your own server.
        // For this demo, we'll use a CDN.
        const mediapipeVersion = '@0.4.1675469240';
        const handsCDN = `https://cdn.jsdelivr.net/npm/@mediapipe/hands${mediapipeVersion}`;

        let camera, scene, renderer, controls;
        let handModel;
        const videoElement = document.getElementById('video');
        const loadingElement = document.getElementById('loading');

        // Dynamically import MediaPipe Hands
        (async () => {
            const script = document.createElement('script');
            script.src = `${handsCDN}/hands.js`;
            script.crossOrigin = 'anonymous';
            document.body.appendChild(script);

            await new Promise(resolve => script.onload = resolve);

            const hands = new window.Hands({
                locateFile: (file) => `${handsCDN}/${file}`
            });

            hands.setOptions({
                maxNumHands: 1,
                modelComplexity: 1,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onResults);

            const camera = new window.Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 640,
                height: 360
            });
            camera.start();

        })();

        initThree();
        loadHandModel();
        animate();

        function initThree() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x333333);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 3);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(1, 1, 1);
            scene.add(directionalLight);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 1;
            controls.maxDistance = 5;

            window.addEventListener('resize', onWindowResize);
        }

        function loadHandModel() {
            const loader = new GLTFLoader();
            // This is a free hand model from Sketchfab by "3D model store"
            // It's important to use a model with a proper skeleton (armature)
            loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js/examples/models/gltf/hand-1.glb', (gltf) => {
                handModel = gltf.scene;
                handModel.scale.set(10, 10, 10);
                handModel.rotation.y = Math.PI; // Point fingers towards the camera initially
                scene.add(handModel);
                loadingElement.style.display = 'none';
            }, undefined, (error) => {
                console.error(error);
                loadingElement.innerText = "Error loading model";
            });
        }

        function onResults(results) {
            if (!results.multiHandLandmarks || !handModel) {
                return;
            }

            const landmarks = results.multiHandLandmarks[0];
            if (!landmarks) {
                return;
            }

            const wrist = handModel.getObjectByName('wrist_JNT');
            const thumbProximal = handModel.getObjectByName('thumb_proximal_JNT');
            const thumbMiddle = handModel.getObjectByName('thumb_middle_JNT');
            const thumbDistal = handModel.getObjectByName('thumb_distal_JNT');
            const indexProximal = handModel.getObjectByName('index_proximal_JNT');
            const indexMiddle = handModel.getObjectByName('index_middle_JNT');
            const indexDistal = handModel.getObjectByName('index_distal_JNT');
            const middleProximal = handModel.getObjectByName('middle_proximal_JNT');
            const middleMiddle = handModel.getObjectByName('middle_middle_JNT');
            const middleDistal = handModel.getObjectByName('middle_distal_JNT');
            const ringProximal = handModel.getObjectByName('ring_proximal_JNT');
            const ringMiddle = handModel.getObjectByName('ring_middle_JNT');
            const ringDistal = handModel.getObjectByName('ring_distal_JNT');
            const pinkyProximal = handModel.getObjectByName('pinky_proximal_JNT');
            const pinkyMiddle = handModel.getObjectByName('pinky_middle_JNT');
            const pinkyDistal = handModel.getObjectByName('pinky_distal_JNT');

            if (wrist) {
                const wristLandmark = landmarks[0];
                wrist.position.set(wristLandmark.x * -5 + 2.5, wristLandmark.y * -3 + 2, wristLandmark.z * -5);

                const handRotation = getHandRotation(landmarks);
                wrist.rotation.set(handRotation.x, handRotation.y, handRotation.z);
            }

            // Update finger rotations
            updateFingerRotation(thumbProximal, landmarks[1], landmarks[2]);
            updateFingerRotation(thumbMiddle, landmarks[2], landmarks[3]);
            updateFingerRotation(thumbDistal, landmarks[3], landmarks[4]);

            updateFingerRotation(indexProximal, landmarks[5], landmarks[6]);
            updateFingerRotation(indexMiddle, landmarks[6], landmarks[7]);
            updateFingerRotation(indexDistal, landmarks[7], landmarks[8]);

            updateFingerRotation(middleProximal, landmarks[9], landmarks[10]);
            updateFingerRotation(middleMiddle, landmarks[10], landmarks[11]);
            updateFingerRotation(middleDistal, landmarks[11], landmarks[12]);

            updateFingerRotation(ringProximal, landmarks[13], landmarks[14]);
            updateFingerRotation(ringMiddle, landmarks[14], landmarks[15]);
            updateFingerRotation(ringDistal, landmarks[15], landmarks[16]);

            updateFingerRotation(pinkyProximal, landmarks[17], landmarks[18]);
            updateFingerRotation(pinkyMiddle, landmarks[18], landmarks[19]);
            updateFingerRotation(pinkyDistal, landmarks[19], landmarks[20]);
        }
        
        function getHandRotation(landmarks) {
            const p1 = new THREE.Vector3(landmarks[5].x, landmarks[5].y, landmarks[5].z);
            const p2 = new THREE.Vector3(landmarks[17].x, landmarks[17].y, landmarks[17].z);
            
            const forward = new THREE.Vector3().subVectors(p1, p2).normalize();
            const up = new THREE.Vector3(0, 1, 0); // Assuming up is y-axis
            const right = new THREE.Vector3().crossVectors(forward, up).normalize();
            const newUp = new THREE.Vector3().crossVectors(right, forward).normalize();
            
            const matrix = new THREE.Matrix4().makeBasis(right, newUp, forward.negate());
            return new THREE.Euler().setFromRotationMatrix(matrix, 'XYZ');
        }

        function updateFingerRotation(bone, p1, p2) {
            if (bone) {
                const v1 = new THREE.Vector3(p1.x, p1.y, p1.z);
                const v2 = new THREE.Vector3(p2.x, p2.y, p2.z);
                const direction = new THREE.Vector3().subVectors(v2, v1).normalize();
                
                const quaternion = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction);
                bone.quaternion.slerp(quaternion, 0.1); // Use slerp for smoother animation
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
